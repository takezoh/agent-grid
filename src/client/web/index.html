<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>agent-reactor — web client</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #ddd; font-family: monospace; }
    #app { display: flex; height: 100vh; }
    #side { width: 280px; padding: 8px; border-right: 1px solid #333; overflow: auto; }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #term { flex: 1; min-height: 0; padding: 4px; }
    #events { height: 140px; overflow: auto; border-top: 1px solid #333; padding: 6px; font-size: 12px; }
    h3 { font-size: 13px; color: #9cf; margin: 6px 0; }
    .row { display: flex; gap: 4px; align-items: center; margin: 3px 0; }
    .row button { font-family: monospace; }
    .sess { padding: 4px 6px; background: #1c1c1c; border-radius: 3px; margin: 3px 0; cursor: pointer; }
    .sess.active { outline: 1px solid #9cf; }
    .ev { margin: 2px 0; padding: 2px 4px; background: #1c1c1c; border-radius: 3px; word-break: break-all; }
    .ev .k { color: #6c6; }
    input { background: #000; color: #ddd; border: 1px solid #444; padding: 3px; }
    #status { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div id="app">
    <div id="side">
      <h3>sessions</h3>
      <div class="row"><input id="cmd" placeholder="command e.g. bash" value="bash" style="flex:1" /></div>
      <div class="row"><input id="project" placeholder="project dir (optional)" style="flex:1" /></div>
      <div class="row"><button id="create">+ create</button> <span id="status"></span></div>
      <div id="list"></div>
    </div>
    <div id="main">
      <div id="term"></div>
      <div id="events"><h3>server-side events</h3><div id="evlist"></div></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const authHeaders = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    const term = new Terminal({ fontSize: 13, cursorBlink: true, theme: { background: '#111' } });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('term'));
    fit.fit();

    let ws = null, activeID = null;
    const status = (s) => document.getElementById('status').textContent = s;

    function logEv(k, text) {
      const d = document.createElement('div');
      d.className = 'ev';
      d.innerHTML = '<span class="k">[' + k + ']</span> ';
      d.appendChild(document.createTextNode(text));
      document.getElementById('evlist').prepend(d);
    }

    async function api(method, path, body) {
      const r = await fetch(path, { method, headers: authHeaders, body: body ? JSON.stringify(body) : undefined });
      if (!r.ok) throw new Error(await r.text());
      return r.status === 204 ? null : r.json();
    }

    async function refresh() {
      const sessions = await api('GET', '/api/sessions');
      const list = document.getElementById('list');
      list.innerHTML = '';
      for (const s of sessions) {
        const el = document.createElement('div');
        el.className = 'sess' + (s.id === activeID ? ' active' : '');
        el.textContent = s.id + ' · ' + s.command;
        const stop = document.createElement('button');
        stop.textContent = '✕';
        stop.onclick = async (e) => { e.stopPropagation(); await api('DELETE', '/api/sessions/' + s.id); refresh(); };
        el.onclick = () => attach(s.id);
        el.appendChild(document.createTextNode(' '));
        el.appendChild(stop);
        list.appendChild(el);
      }
    }

    function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }
    function sendResize() { send({ k: 'r', cols: term.cols, rows: term.rows }); }

    function attach(id) {
      if (ws) { ws.close(); ws = null; }
      activeID = id;
      term.reset();
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws?session=${encodeURIComponent(id)}&token=${encodeURIComponent(token)}`);
      ws.onopen = () => { status('attached ' + id); sendResize(); refresh(); };
      ws.onclose = () => status('detached');
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (Array.isArray(msg)) { if (msg[1] === 'o') term.write(msg[2]); return; }
        logEv(msg.k + (msg.code ? ' ' + msg.code : ''), msg.data || '');
      };
    }

    term.onData((d) => send({ k: 'i', d }));
    term.onResize(() => sendResize());
    addEventListener('resize', () => fit.fit());
    document.getElementById('create').onclick = async () => {
      try {
        const info = await api('POST', '/api/sessions', {
          command: document.getElementById('cmd').value,
          project: document.getElementById('project').value,
          cols: term.cols, rows: term.rows,
        });
        await refresh();
        attach(info.id);
      } catch (err) { status('error: ' + err.message); }
    };
    refresh();
  </script>
</body>
</html>
