<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>webterm PoC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #ddd; font-family: monospace; }
    #app { display: flex; height: 100vh; }
    #term { flex: 1; min-width: 0; padding: 4px; }
    #side { width: 320px; padding: 8px; overflow: auto; border-left: 1px solid #333; }
    #side h3 { font-size: 13px; margin: 4px 0; color: #9cf; }
    .ev { font-size: 12px; margin: 2px 0; padding: 3px 5px; background: #1c1c1c; border-radius: 3px; word-break: break-all; }
    .ev .k { color: #6c6; }
    #status { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div id="app">
    <div id="term"></div>
    <div id="side">
      <h3>server-side events</h3>
      <div id="status">connecting…</div>
      <div id="events"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script>
    const term = new Terminal({ fontSize: 13, cursorBlink: true, theme: { background: '#111' } });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('term'));
    fit.fit();

    const events = document.getElementById('events');
    const status = document.getElementById('status');
    function logEv(k, text) {
      const d = document.createElement('div');
      d.className = 'ev';
      d.innerHTML = '<span class="k">[' + k + ']</span> ';
      d.appendChild(document.createTextNode(text));
      events.prepend(d);
    }

    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => { status.textContent = 'connected'; sendResize(); };
    ws.onclose = () => { status.textContent = 'disconnected'; };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (Array.isArray(msg)) {           // asciicast [t, "o", data]
        if (msg[1] === 'o') term.write(msg[2]);
        return;
      }
      logEv(msg.k + (msg.code ? ' ' + msg.code : ''), msg.data || '');
    };

    function send(o) { if (ws.readyState === 1) ws.send(JSON.stringify(o)); }
    function sendResize() { send({ k: 'r', cols: term.cols, rows: term.rows }); }

    term.onData((d) => send({ k: 'i', d }));
    term.onResize(() => sendResize());
    addEventListener('resize', () => fit.fit());
  </script>
</body>
</html>
