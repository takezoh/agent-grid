name: E2E Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/client/web/package-lock.json

      - name: build web assets
        working-directory: src/client/web
        run: |
          npm ci
          npm run build

      - name: Install codex 0.133.0
        run: npm install -g @openai/codex@0.133.0

      - name: Install claude
        run: npm install -g @anthropic-ai/claude-code

      - name: Select available e2e suites
        id: suite_env
        run: |
          if [[ -n "${OPENAI_API_KEY:-}" ]]; then
            echo "reactor_e2e_codex_bin=$(command -v codex)" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "reactor_e2e_claude_bin=$(command -v claude)" >> "$GITHUB_OUTPUT"
          fi
          if command -v docker >/dev/null 2>&1; then
            echo "reactor_e2e_docker_bin=$(command -v docker)" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skipped suites
        if: steps.suite_env.outputs.reactor_e2e_codex_bin == '' || steps.suite_env.outputs.reactor_e2e_claude_bin == '' || steps.suite_env.outputs.reactor_e2e_docker_bin == ''
        run: |
          [[ -n "${{ steps.suite_env.outputs.reactor_e2e_codex_bin }}" ]] || echo "Skipping Codex-backed e2e suites: OPENAI_API_KEY is not configured."
          [[ -n "${{ steps.suite_env.outputs.reactor_e2e_claude_bin }}" ]] || echo "Skipping Claude-backed e2e suites: ANTHROPIC_API_KEY is not configured."
          [[ -n "${{ steps.suite_env.outputs.reactor_e2e_docker_bin }}" ]] || echo "Skipping Docker-backed e2e suites: docker is not available on this runner."

      - name: Require full nightly suite coverage
        run: |
          [[ -n "${{ steps.suite_env.outputs.reactor_e2e_codex_bin }}" ]] || { echo "Nightly e2e requires Codex coverage."; exit 1; }
          [[ -n "${{ steps.suite_env.outputs.reactor_e2e_claude_bin }}" ]] || { echo "Nightly e2e requires Claude coverage."; exit 1; }
          [[ -n "${{ steps.suite_env.outputs.reactor_e2e_docker_bin }}" ]] || { echo "Nightly e2e requires Docker coverage."; exit 1; }

      - name: Run nightly e2e
        working-directory: .
        env:
          REACTOR_E2E_CODEX_BIN: ${{ steps.suite_env.outputs.reactor_e2e_codex_bin }}
          REACTOR_E2E_CLAUDE_BIN: ${{ steps.suite_env.outputs.reactor_e2e_claude_bin }}
          REACTOR_E2E_DOCKER_BIN: ${{ steps.suite_env.outputs.reactor_e2e_docker_bin }}
        run: make test-e2e

      - name: Open or update nightly e2e failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Nightly e2e workflow failed";
            const body = [
              "The nightly `E2E Nightly` workflow failed.",
              "",
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Commit: ${context.sha}`,
              `- Triggered by: ${context.eventName}`,
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              creator: "github-actions[bot]",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
