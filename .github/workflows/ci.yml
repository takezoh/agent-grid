name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: clients/ui/package-lock.json
      - name: Run PR core verification profile
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
          REPEAT_ARTIFACT: test-results-repeat.json
          HARNESS_TAMPERING_ARTIFACT: harness-tampering-result.json
          AG_HARNESS_PROFILE_ARTIFACT: test-harness/profile-result-core.json
        run: scripts/run-verification-profile.sh pr core
      - name: Upload PR core verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-core-verification
          path: |
            test-harness/profile-result-core.json
            test-results-repeat.json
            harness-tampering-result.json
            mutation-results.json

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: clients/ui/package-lock.json
      - name: Run PR race verification profile
        env:
          AG_HARNESS_PROFILE_ARTIFACT: test-harness/profile-result-race.json
        run: scripts/run-verification-profile.sh pr race
      - name: Upload race verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-race-verification
          path: test-harness/profile-result-race.json

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: clients/ui/package-lock.json
      - name: Run PR fuzz verification profile
        env:
          AG_HARNESS_PROFILE_ARTIFACT: test-harness/profile-result-fuzz.json
        run: scripts/run-verification-profile.sh pr fuzz
      - name: Upload fuzz verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-fuzz-verification
          path: test-harness/profile-result-fuzz.json

  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install schema source Codex
        run: scripts/install-pinned-codex.sh schema
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run schema verification profile
        env:
          AG_HARNESS_PROFILE_ARTIFACT: test-harness/profile-result-schema.json
        run: scripts/run-verification-profile.sh pr schema
      - name: Upload schema verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-schema-verification
          path: test-harness/profile-result-schema.json
