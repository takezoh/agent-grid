name: Auto Fix CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  actions: read
  pull-requests: write
  id-token: write

jobs:
  auto-fix:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest

    steps:
      # 同一 head_sha に対する auto-fix 再試行を 1 回に制限
      - name: Check for prior auto-fix run
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          count=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow "Auto Fix CI" \
            --status success \
            --json headSha \
            --jq "[.[] | select(.headSha == \"$HEAD_SHA\")] | length")
          echo "prior_success=$count" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.guard.outputs.prior_success == '0'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v5
        if: steps.guard.outputs.prior_success == '0'
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Auto-fix with Claude Code
        if: steps.guard.outputs.prior_success == '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash,Edit,Write,Read"
          prompt: |
            CI run ${{ github.event.workflow_run.id }} failed on main. Fix it:

            1. Get the failure log:
               gh run view ${{ github.event.workflow_run.id }} --log-failed

            2. Identify the root cause and apply the minimal fix.
               Follow AGENTS.md rules: max 500 lines/file, 50 lines/function,
               tests are required for any new or changed behavior.

            3. Verify all checks pass:
               cd src && go vet ./... && go test ./... && go build -o ../roost . && go tool golangci-lint run ./...

            4. Commit and push the fix to main with a descriptive commit message.
          env: |
            GITHUB_TOKEN=${{ github.token }}
